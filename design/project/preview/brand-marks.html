<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nous · Brand · Marks</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#171717; color:#e8e4df;
    font-family: "Geist", sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { padding: 22px 26px; display:flex; gap: 36px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .lbl { font-size: 11px; color:#8a8580; font-family:"Geist Mono", ui-monospace, monospace; }
  .small { width: 28px; height: 28px; border-radius: 9999px; background: rgba(196,149,106,0.12);
           display:flex; align-items:center; justify-content:center; color:#c4956a;
           font-size: 12px; font-weight: 500; }
  .medium { width: 48px; height: 48px; border-radius: 16px; background: rgba(196,149,106,0.12);
            display:flex; align-items:center; justify-content:center; color:#c4956a;
            font-size: 22px; font-weight: 500; }
  .large { width: 72px; height: 72px; border-radius: 18px; background: rgba(196,149,106,0.12);
           display:flex; align-items:center; justify-content:center; color:#c4956a;
           font-size: 32px; font-weight: 500; }
  .word { font-size: 28px; font-weight: 600; letter-spacing: -0.011em; color:#e8e4df; }
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="small">N</div><div class="lbl">avatar · 28</div></div>
  <div class="item"><div class="medium">N</div><div class="lbl">mark · 48</div></div>
  <div class="item"><div class="large">N</div><div class="lbl">app · 72</div></div>
  <div class="item"><span class="word">Nous</span><div class="lbl">wordmark</div></div>
</div>
</body>
</html>
