<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nous · Type · Body</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#171717; color:#e8e4df;

  .body { font-size: 14px; line-height: 1.65; color:#e8e4df; }
  .body-sm { font-size: 13px; line-height: 1.65; color:#8a8580; }
  .caption { font-size: 12px; line-height: 1.5; color:#8a8580; }
  .tag { font-size: 11px; font-weight:500; color:#8a8580;
         background: rgba(138,133,128,0.15); padding: 2px 8px; border-radius: 9999px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <span class="meta">body · 14 / 1.65</span>
    <span class="body">认知层 AI 建模——不只模仿你怎么说话，理解你怎么想。</span>
  </div>
  <div class="row">

  </div>

    <span class="meta">tag · 11 / 500</span>

  </div>
</div>
</body>
</html>
