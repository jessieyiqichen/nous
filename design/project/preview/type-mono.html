<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nous · Type · Mono</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#171717; color:#e8e4df;
    font-family: "Geist", sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { padding: 18px 26px; display:flex; flex-direction:column; gap: 12px; }
  .row { display:flex; align-items:flex-start; gap: 18px; }
  .meta { font-family: "Geist Mono", ui-monospace, monospace; font-size: 10px; color:#6b6762; min-width: 110px; padding-top: 4px; flex-shrink:0; }
  .mono13 { font-family:"Geist Mono", ui-monospace, monospace; font-size: 13px; color:#e8e4df; line-height: 1.5; }
  .pre { font-family:"Geist Mono", ui-monospace, monospace; font-size: 12px; color:#e8e4df;
         background:#1e1e1e; border:1px solid #2a2a2a; border-radius: 8px; padding: 10px 12px; line-height: 1.5;
         white-space: pre; overflow:hidden; }
  .stat { font-size: 24px; font-weight: 700; line-height: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <span class="meta">mono · 13</span>
    <span class="mono13">cognitive_model_2026-05-06.json</span>
  </div>
  <div class="row">
    <span class="meta">mono pre · 12</span>
    <pre class="pre">{ "dimension": "Decision Architecture",
  "confidence": "high",
  "behavioral_predictions": 4 }</pre>
  </div>
  <div class="row">
    <span class="meta">stat · 24 / 700</span>
    <span class="stat">71%</span>
  </div>
</div>
</body>
</html>
