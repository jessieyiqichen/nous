<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nous · Components · Tags & Pills</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#171717; color:#e8e4df;
    font-family: "Geist", sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { padding: 18px 26px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap: wrap; }
  .lbl { font-family:"Geist Mono", ui-monospace, monospace; font-size: 10px; color:#6b6762; min-width: 90px; }
  .pill { font-size: 11px; padding: 3px 9px; border-radius: 9999px; font-weight: 500; }
  .chip { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
  .chip-out { font-size: 11px; padding: 3px 8px; border-radius: 4px; border: 1px solid; }
  .focus { font-size: 11px; padding: 4px 10px; border-radius: 9999px;
           background: rgba(196,149,106,0.12); color:#c4956a; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <span class="lbl">confidence</span>
    <span class="pill" style="background: rgba(110,200,122,0.15); color:#6ec87a">high</span>
    <span class="pill" style="background: rgba(196,149,106,0.15); color:#c4956a">medium</span>
    <span class="pill" style="background: rgba(138,133,128,0.15); color:#8a8580">low</span>
    <span class="pill" style="background: rgba(138,133,128,0.10); color:#6b6762">none</span>
  </div>
  <div class="row">
    <span class="lbl">role</span>
    <span class="chip" style="background: rgba(96,165,250,0.20); color:#93c5fd">用户</span>
    <span class="chip" style="background: rgba(74,222,128,0.20); color:#86efac">AI</span>
  </div>
  <div class="row">
    <span class="lbl">severity</span>
    <span class="chip-out" style="background: rgba(59,130,246,0.20); color:#93c5fd; border-color: rgba(59,130,246,0.30)">低</span>
    <span class="chip-out" style="background: rgba(234,179,8,0.20); color:#fde047; border-color: rgba(234,179,8,0.30)">中</span>
    <span class="chip-out" style="background: rgba(249,115,22,0.20); color:#fdba74; border-color: rgba(249,115,22,0.30)">高</span>
    <span class="chip-out" style="background: rgba(239,68,68,0.20); color:#fca5a5; border-color: rgba(239,68,68,0.30)">严重</span>
  </div>
  <div class="row">
    <span class="lbl">focus dim</span>
    <span class="focus">决策架构</span>
    <span class="focus">推理风格</span>
  </div>
</div>
</body>
</html>
