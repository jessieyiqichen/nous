<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nous · Components · Header & Tabs</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#171717; color:#e8e4df;
    font-family: "Geist", "PingFang SC", sans-serif; -webkit-font-smoothing: antialiased; }
  .header { border-bottom: 1px solid #2a2a2a; }
  .inner { padding: 14px 26px; display:flex; align-items:center; justify-content:space-between; }
  .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.011em; color:#e8e4df; }
  .nav { display:flex; gap: 2px; padding: 4px; background:#1e1e1e; border-radius: 8px; }
  .tab { padding: 6px 14px; font-size: 13px; color:#8a8580; border-radius: 6px;
         transition: all 200ms; cursor: pointer; }
  .tab:hover { color:#e8e4df; }
  .tab.active { background: rgba(196,149,106,0.12); color:#c4956a; font-weight: 500; }
</style>
</head>
<body>
<div class="header">
  <div class="inner">
    <span class="brand">Nous</span>
    <nav class="nav">
      <span class="tab active">认知访谈</span>
      <span class="tab">模型验证</span>
      <span class="tab">偏差检测</span>
      <span class="tab">认知预测</span>
      <span class="tab">研究数据</span>
    </nav>
  </div>
</div>
</body>
</html>
