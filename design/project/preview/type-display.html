<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nous · Type · Display</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap">
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#171717; color:#e8e4df;
    font-family: "Geist", -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased; }
  .wrap { padding: 20px 28px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:baseline; gap: 18px; }
  .meta { font-family: "Geist Mono", ui-monospace, monospace; font-size: 10px; color:#6b6762; min-width: 110px; }
  h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: -0.011em; line-height: 1.2; }
  h2 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.011em; }
  h3 { margin: 0; font-size: 14px; font-weight: 500; }
  .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.011em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <span class="meta">brand · 18 / 600</span>
    <span class="brand">Nous</span>
  </div>
  <div class="row">
    <span class="meta">h1 · 20 / 700</span>
    <h1>研究数据</h1>
  </div>
  <div class="row">
    <span class="meta">h2 · 18 / 600</span>
    <h2>修正后的认知模型</h2>
  </div>
  <div class="row">
    <span class="meta">h3 · 14 / 500</span>
    <h3>决策架构 · Decision Architecture</h3>
  </div>
</div>
</body>
</html>
